<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JBRAKA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <img src="banner.jpg" class="logo-loading">
  <h1>JB<span>RAKA</span></h1>
  <p>TEMPATNYA DUNIA DIGITAL</p>
  <div class="bar">
    <div class="progress"></div>
  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <div class="popup-header">INFORMASI</div>
    <img src="link saluran.jpg" class="popup-img">
    <button onclick="join()">Join Sekarang</button>
    <button onclick="closePopup()" class="close">Tutup</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- HEADER -->
  <header>
    <img src="banner.jpg" class="logo">
    <h2>JB<span>RAKA</span></h2>
  </header>

  <!-- KATEGORI -->
  <div class="kategori">
    <button class="active">AKUN</button>
  </div>

  <!-- BANNER -->
  <div class="banner">
    <img src="banner.jpg">
  </div>

  <!-- PROMO -->
  <div class="promo">
    <h3><span class="line"></span> Promo <span class="red">Spesial</span></h3>
    <div class="hot">🔥 HOT DEAL</div>

    <div class="card">
      <img src="banner.jpg">
      <h4>AKUN FF</h4>
      <p>SESUAI SPEK</p>
      <button onclick="join()">Beli</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
